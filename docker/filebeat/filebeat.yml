filebeat.inputs:
  # Application logs
  - type: log
    enabled: true
    paths:
      - /var/log/novel-audit/*.log
      - /var/log/novel-audit/**/*.log
    fields:
      service: novel-audit-api
      environment: production
    fields_under_root: true
    multiline.pattern: '^\d{4}-\d{2}-\d{2}'
    multiline.negate: true
    multiline.match: after

  # Nginx access logs
  - type: log
    enabled: true
    paths:
      - /var/log/nginx/access.log
    fields:
      service: nginx
      log_type: access
    fields_under_root: true

  # Nginx error logs
  - type: log
    enabled: true
    paths:
      - /var/log/nginx/error.log
    fields:
      service: nginx
      log_type: error
    fields_under_root: true

  # Docker container logs
  - type: container
    enabled: true
    paths:
      - '/var/lib/docker/containers/*/*.log'
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"

# Output configuration
output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "novel-audit-logs-%{+yyyy.MM.dd}"
  template.name: "novel-audit"
  template.pattern: "novel-audit-*"
  template.settings:
    index.number_of_shards: 1
    index.number_of_replicas: 0

# Logging configuration
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644

# Processors
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_docker_metadata: ~
  - add_kubernetes_metadata: ~

# Template configuration
setup.template.settings:
  index.number_of_shards: 1
  index.codec: best_compression

# Index lifecycle management
setup.ilm.enabled: true
setup.ilm.rollover_alias: "novel-audit-logs"
setup.ilm.pattern: "{now/d}-000001"
setup.ilm.policy: "novel-audit-policy"